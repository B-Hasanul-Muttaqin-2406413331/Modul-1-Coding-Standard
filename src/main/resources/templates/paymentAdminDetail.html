<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Admin Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-4">
    <h3>Payment Admin Detail</h3>

    <div th:if="${payment != null}">
        <p><strong>Payment ID:</strong> <span th:text="${payment.id}"></span></p>
        <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>
        <p><strong>Status:</strong> <span th:text="${payment.status}"></span></p>

        <h5>Payment Data</h5>
        <table border="1" class="table table-striped table-responsive-md">
            <thead>
            <tr>
                <th scope="col">Key</th>
                <th scope="col">Value</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${payment.paymentData}">
                <td th:text="${entry.key}"></td>
                <td th:text="${entry.value}"></td>
            </tr>
            </tbody>
        </table>

        <form th:action="@{/payment/admin/set-status/{paymentId}(paymentId=${payment.id})}" method="post">
            <div class="form-group">
                <label for="statusInput">Set Status</label>
                <select id="statusInput" name="status" class="form-control col-4 mb-3">
                    <option value="SUCCESS">Accept (SUCCESS)</option>
                    <option value="REJECTED">Reject (REJECTED)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>

    <p th:if="${payment == null}">Payment not found.</p>
</div>

</body>
</html>
