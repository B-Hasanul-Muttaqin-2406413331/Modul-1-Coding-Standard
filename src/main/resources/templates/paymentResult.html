<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Result</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-4">
    <h3>Payment Result</h3>

    <p><strong>Payment ID:</strong> <span th:text="${paymentId}"></span></p>

    <p th:if="${orderId != null}">
        <strong>Order ID:</strong> <span th:text="${orderId}"></span>
    </p>

    <p th:if="${paymentStatus != null}">
        <strong>Payment Status:</strong> <span th:text="${paymentStatus}"></span>
    </p>
</div>

</body>
</html>
