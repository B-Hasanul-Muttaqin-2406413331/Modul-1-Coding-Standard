<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pay Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-4">
    <h3>Pay Order</h3>

    <div th:if="${order != null}">
        <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
        <p><strong>Author:</strong> <span th:text="${order.author}"></span></p>
        <p><strong>Status:</strong> <span th:text="${order.status}"></span></p>

        <form th:action="@{/order/pay/{orderId}(orderId=${order.id})}" method="post">
            <div class="form-group">
                <label for="methodInput">Payment Method</label>
                <select id="methodInput" name="method" class="form-control col-4 mb-3">
                    <option value="VOUCHER_CODE">Voucher Code</option>
                    <option value="CASH_ON_DELIVERY">Cash On Delivery</option>
                </select>
            </div>

            <div class="form-group">
                <label for="voucherCodeInput">Voucher Code</label>
                <input type="text" id="voucherCodeInput" name="voucherCode" class="form-control col-6 mb-2"
                       placeholder="ESHOPXXXXXXXXXXX">
            </div>

            <div class="form-group">
                <label for="addressInput">Address</label>
                <input type="text" id="addressInput" name="address" class="form-control col-6 mb-2"
                       placeholder="Delivery address">
            </div>

            <div class="form-group">
                <label for="deliveryFeeInput">Delivery Fee</label>
                <input type="text" id="deliveryFeeInput" name="deliveryFee" class="form-control col-4 mb-3"
                       placeholder="10000">
            </div>

            <button type="submit" class="btn btn-primary">Pay</button>
        </form>
    </div>

    <p th:if="${order == null}">Order not found.</p>
</div>

</body>
</html>
