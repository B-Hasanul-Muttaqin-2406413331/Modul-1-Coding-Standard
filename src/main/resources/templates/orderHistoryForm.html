<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-4">
    <h3>Find Order History</h3>
    <p>Input your name to see all orders.</p>

    <form th:action="@{/order/history}" method="post">
        <div class="form-group">
            <label for="authorInput">Author</label>
            <input type="text" class="form-control mb-3 col-4" id="authorInput" name="author"
                   placeholder="Enter your name">
        </div>
        <button type="submit" class="btn btn-primary">Find Orders</button>
    </form>
</div>

</body>
</html>
