<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-4">
    <h3>Check Payment Detail</h3>
    <p>Input payment ID to see payment details.</p>

    <form method="get" id="paymentDetailForm">
        <div class="form-group">
            <label for="paymentIdInput">Payment ID</label>
            <input type="text" class="form-control mb-3 col-6" id="paymentIdInput" name="paymentId"
                   placeholder="Enter payment ID">
        </div>
        <button type="submit" class="btn btn-primary">Check Detail</button>
    </form>
</div>

<script>
    const form = document.getElementById('paymentDetailForm');
    form.addEventListener('submit', function (event) {
        event.preventDefault();
        const paymentId = document.getElementById('paymentIdInput').value;
        if (paymentId) {
            window.location.href = '/payment/detail/' + paymentId;
        }
    });
</script>

</body>
</html>
